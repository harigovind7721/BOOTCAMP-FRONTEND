<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pro Calculator</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Poppins, sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #0f172a, #1e293b, #312e81);
        overflow: hidden;
        transition: 0.4s;
      }

      body.light {
        background: linear-gradient(135deg, #f8fafc, #cbd5e1, #dbeafe);
      }

      .background {
        position: absolute;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      .circle {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        animation: move 15s infinite alternate;
      }

      .c1 {
        width: 300px;
        height: 300px;
        background: #00d4ff;
        left: -80px;
        top: -80px;
      }

      .c2 {
        width: 280px;
        height: 280px;
        background: #8b5cf6;
        right: -100px;
        bottom: -100px;
        animation-duration: 20s;
      }

      @keyframes move {
        100% {
          transform: translate(80px, -60px) scale(1.3);
        }
      }

      .calculator {
        position: relative;
        width: 380px;
        backdrop-filter: blur(18px);
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 25px;
        padding: 22px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        z-index: 10;
      }

      body.light .calculator {
        background: rgba(255, 255, 255, 0.6);
      }

      .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        color: white;
      }

      body.light .top {
        color: #111;
      }

      .theme {
        cursor: pointer;
        font-size: 22px;
      }

      .display {
        background: rgba(255, 255, 255, 0.1);
        padding: 15px;
        border-radius: 18px;
        margin-bottom: 20px;
        overflow: hidden;
      }

      .history {
        height: 25px;
        font-size: 14px;
        color: #ccc;
        text-align: right;
      }

      body.light .history {
        color: #555;
      }

      .result {
        font-size: 34px;
        font-weight: 600;
        color: white;
        text-align: right;
        word-wrap: break-word;
        min-height: 45px;
      }

      body.light .result {
        color: #111;
      }

      .buttons {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 12px;
      }

      button {
        height: 62px;
        border: none;
        border-radius: 18px;
        font-size: 18px;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.12);
        color: white;
        transition: 0.2s;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
      }

      body.light button {
        color: #111;
      }

      button:hover {
        transform: translateY(-3px);
        background: #06b6d4;
      }

      .operator {
        background: #2563eb;
      }

      .equal {
        background: #16a34a;
        grid-column: span 2;
      }

      .clear {
        background: #dc2626;
      }

      .historyPanel {
        margin-top: 18px;
        max-height: 140px;
        overflow: auto;
        color: white;
        font-size: 14px;
      }

      body.light .historyPanel {
        color: #111;
      }

      .historyPanel div {
        padding: 5px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      ::-webkit-scrollbar {
        width: 4px;
      }

      ::-webkit-scrollbar-thumb {
        background: #777;
      }

      @media (max-width: 420px) {
        .calculator {
          width: 95%;
        }

        button {
          height: 55px;
        }
      }
    </style>
  </head>

  <body>
    <div class="background">
      <div class="circle c1"></div>
      <div class="circle c2"></div>
    </div>

    <div class="calculator">
      <div class="top">
        <h2>PRO Calculator</h2>
        <div class="theme" onclick="theme()">🌙</div>
      </div>

      <div class="display">
        <div class="history" id="history"></div>

        <div class="result" id="result">0</div>
      </div>

      <div class="buttons">
        <button class="clear" onclick="clr()">C</button>
        <button onclick="del()">⌫</button>
        <button onclick="add('(')">(</button>
        <button onclick="add(')')">)</button>
        <button class="operator" onclick="add('/')">÷</button>

        <button onclick="add('7')">7</button>
        <button onclick="add('8')">8</button>
        <button onclick="add('9')">9</button>
        <button onclick="add('*')">×</button>
        <button onclick="func('sqrt')">√</button>

        <button onclick="add('4')">4</button>
        <button onclick="add('5')">5</button>
        <button onclick="add('6')">6</button>
        <button onclick="add('-')">−</button>
        <button onclick="func('pow')">x²</button>

        <button onclick="add('1')">1</button>
        <button onclick="add('2')">2</button>
        <button onclick="add('3')">3</button>
        <button onclick="add('+')">+</button>
        <button onclick="func('percent')">%</button>

        <button onclick="add('.')">.</button>
        <button onclick="add('0')">0</button>
        <button onclick="func('sin')">sin</button>
        <button onclick="func('cos')">cos</button>

        <button class="equal" onclick="calculate()">=</button>
      </div>

      <div class="historyPanel" id="log"></div>
    </div>

    <script>
      let exp = "";
      const result = document.getElementById("result");
      const history = document.getElementById("history");
      const log = document.getElementById("log");

      function update() {
        result.innerHTML = exp || 0;
      }

      function add(v) {
        exp += v;
        update();
      }

      function clr() {
        exp = "";
        history.innerHTML = "";
        update();
      }

      function del() {
        exp = exp.slice(0, -1);
        update();
      }

      function func(type) {
        try {
          let value = eval(exp || 0);

          switch (type) {
            case "sqrt":
              exp = Math.sqrt(value).toString();
              break;

            case "pow":
              exp = Math.pow(value, 2).toString();
              break;

            case "percent":
              exp = (value / 100).toString();
              break;

            case "sin":
              exp = Math.sin((value * Math.PI) / 180).toString();
              break;

            case "cos":
              exp = Math.cos((value * Math.PI) / 180).toString();
              break;
          }

          update();
        } catch {}
      }

      function calculate() {
        try {
          let ans = eval(exp);

          history.innerHTML = exp + " =";

          log.innerHTML =
            "<div>" + exp + " = " + ans + "</div>" + log.innerHTML;

          exp = ans.toString();

          update();
        } catch {
          result.innerHTML = "Error";
        }
      }

      document.addEventListener("keydown", (e) => {
        if ((e.key >= "0" && e.key <= "9") || "+-*/().".includes(e.key))
          add(e.key);
        else if (e.key === "Enter") calculate();
        else if (e.key === "Backspace") del();
        else if (e.key === "Escape") clr();
      });

      function theme() {
        document.body.classList.toggle("light");

        document.querySelector(".theme").innerHTML =
          document.body.classList.contains("light") ? "☀️" : "🌙";
      }

      update();
    </script>
  </body>
</html>
